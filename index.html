<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System - Part 1</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }

        .container {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        input, button {
            margin: 6px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            background: lightblue;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

            button:hover {
                background: blue;
            }

        #itemDisplayArea {
            margin-top: 15px;
            padding: 10px;
            background: gray;
            border-radius: 6px;
            white-space: pre-line;
        }

        label {
            display: inline-block;
            width: 120px;
        }
    </style>
    <script src="index.js"></script>
</head>
<body>
    <h1>Inventory Management System (Part 1)</h1>

    <!-- Display area -->
    <div class="container">
        <h2>Item Display Area</h2>
        <div id="itemDisplayArea">(No items yet)</div>
    </div>

    <!-- Show all products -->
    <div class="container">
        <button onclick="">Show All Items</button>
        <button onclick="">Show Popular Items</button>
    </div>

    <!-- Add product -->
    <div class="container">
        <h2>Add New Item</h2>
        <label>Item Name*:</label> <input type="text" id="addName"><br>
        <label>Category*:</label> <input type="text" id="addCategory"><br>
        <label>Quantity*:</label> <input type="number" id="addQuantity"><br>
        <label>Price*:</label> <input type="number" id="addPrice"><br>
        <label>Supplier*:</label> <input type="text" id="addSupplier"><br>
        <label>Popular?*:</label> <input type="text" id="addPopular" placeholder="Yes/No"><br>
        <label>Comment:</label> <input type="text" id="addComment"><br>
        <button onclick="">Add Item</button>
    </div>

    <!-- Update the product -->
    <div class="container">
        <h2>Update Item (By Name)</h2>
        <label>Item Name*:</label> <input type="text" id="updateName"><br>
        <label>New Category:</label> <input type="text" id="updateCategory"><br>
        <label>New Quantity:</label> <input type="number" id="updateQuantity"><br>
        <label>New Price:</label> <input type="number" id="updatePrice"><br>
        <label>New Supplier:</label> <input type="text" id="updateSupplier"><br>
        <button onclick="">Update Item</button>
    </div>

    <!-- Delete the product -->
    <div class="container">
        <h2>Delete Item (By Name)</h2>
        <label>Item Name*:</label> <input type="text" id="deleteName"><br>
        <button onclick="">Delete Item</button>
    </div>

    <!-- Search for products -->
    <div class="container">
        <h2>Search Item (By Name)</h2>
        <label>Item Name*:</label> <input type="text" id="searchName"><br>
        <button onclick="">Search Item</button>
    </div>
</body>
</html>
