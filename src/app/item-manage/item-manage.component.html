  <a routerLink="/">Home</a>
  <a routerLink="/manage">Manage Items</a>
  <a routerLink="/search">Search Items</a>
  <a routerLink="/privacy-security">Privacy & Security</a>
  <a routerLink="/help">Help & FAQ</a>

<div class="container">
  <h1>📦 Inventory Management</h1>

  <!-- Display area -->
  <div class="display-area">
    <h3>Item Display Area</h3>
    <div id="itemDisplayArea" class="display-content">{{ message }}</div>
  </div>

  <!-- Quick operation button -->
  <div class="action-buttons">
    <button (click)="showAllItems()">Show All Items</button>
    <button (click)="showPopularItems()">Show Popular Items</button>
  </div>

  <!-- Add product -->
  <div class="form-card">
    <h3>Add New Item</h3>
    <div class="form-group">
      <label>Item Name*:</label>
      <input type="text" [(ngModel)]="addName" placeholder="Enter item name">
    </div>
    <div class="form-group">
      <label>Category*:</label>
      <input type="text" [(ngModel)]="addCategory" placeholder="e.g. Electronics">
    </div>
    <div class="form-group">
      <label>Quantity*:</label>
      <input type="number" [(ngModel)]="addQuantity" placeholder="0">
    </div>
    <div class="form-group">
      <label>Price*:</label>
      <input type="number" [(ngModel)]="addPrice" placeholder="0.00">
    </div>
    <div class="form-group">
      <label>Supplier*:</label>
      <input type="text" [(ngModel)]="addSupplier" placeholder="Supplier name">
    </div>
    <div class="form-group">
      <label>Popular?*:</label>
      <input type="text" [(ngModel)]="addPopular" placeholder="Yes/No">
    </div>
    <div class="form-group">
      <label>Comment:</label>
      <input type="text" [(ngModel)]="addComment" placeholder="Optional">
    </div>
    <button class="submit-btn" (click)="addNewItem()">Add Item</button>
  </div>

  <!-- Update the product -->
  <div class="form-card">
    <h3>Update Item (By Name)</h3>
    <div class="form-group">
      <label>Item Name*:</label>
      <input type="text" [(ngModel)]="updateName" placeholder="Enter item name to update">
    </div>
    <div class="form-group">
      <label>New Category:</label>
      <input type="text" [(ngModel)]="updateCategory" placeholder="Leave blank to keep current">
    </div>
    <div class="form-group">
      <label>New Quantity:</label>
      <input type="number" [(ngModel)]="updateQuantity" placeholder="Leave blank to keep current">
    </div>
    <div class="form-group">
      <label>New Price:</label>
      <input type="number" [(ngModel)]="updatePrice" placeholder="Leave blank to keep current">
    </div>
    <div class="form-group">
      <label>New Supplier:</label>
      <input type="text" [(ngModel)]="updateSupplier" placeholder="Leave blank to keep current">
    </div>
    <button class="submit-btn" (click)="updateItem()">Update Item</button>
  </div>

  <!-- Delete the product -->
  <div class="form-card">
    <h3>Delete Item (By Name)</h3>
    <div class="form-group">
      <label>Item Name*:</label>
      <input type="text" [(ngModel)]="deleteName" placeholder="Enter item name to delete">
    </div>
    <button class="submit-btn delete-btn" (click)="deleteItem()">Delete Item</button>
  </div>
</div>
